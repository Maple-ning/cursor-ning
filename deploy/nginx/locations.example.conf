# =============================================================================
# Nginx 片段：博客 + 聊天室（与 deploy/README.md 一致）
# 将下方 location 块放入已有 server { ... } 中，按需改路径与端口。
# 顺序说明：^~ 的 /api/chat-socket/、/api-chat/、/api-blog/ 应写在通用 location /api/ 之前，
# 避免被其它前缀错误匹配。
# =============================================================================

# 管理后台 / 博客前台静态（路径与 deploy.config 中 RemotePath 一致）
#
# 重要：Vite 构建的 JS/CSS 带 hash，部署后旧文件名会消失。若仅用 try_files 回退到
# index.html，则请求不存在的 /blog/assets/xxx.js 会拿到 HTML，浏览器报
# 「Expected a JavaScript module but got text/html」。因此 assets 必须单独 location，
# 缺失时由 Nginx 返回 404，不要回退到 SPA 入口。
#
# index.html 勿长期强缓存，否则用户仍持有旧入口、引用已删 chunk，同样会触发上述错误。

location ^~ /admin/assets/ {
    alias /usr/share/nginx/html/blog-admin/assets/;
    expires 1y;
    add_header Cache-Control "public, immutable";
    access_log off;
}
location = /admin/index.html {
    alias /usr/share/nginx/html/blog-admin/index.html;
    add_header Cache-Control "no-cache, no-store, must-revalidate";
}
location /admin/ {
    alias /usr/share/nginx/html/blog-admin/;
    try_files $uri $uri/ /admin/index.html;
}

location ^~ /blog/assets/ {
    alias /usr/share/nginx/html/blog-front/assets/;
    expires 1y;
    add_header Cache-Control "public, immutable";
    access_log off;
}
location = /blog/index.html {
    alias /usr/share/nginx/html/blog-front/index.html;
    add_header Cache-Control "no-cache, no-store, must-revalidate";
}
location /blog/ {
    alias /usr/share/nginx/html/blog-front/;
    try_files $uri $uri/ /blog/index.html;
}

# 聊天室 SPA（可选，静态资源部署到该目录时启用）
# location /chat/ {
#     alias /usr/share/nginx/html/chat-room/;
#     try_files $uri $uri/ /chat/index.html;
# }

# 博客 JSON API（blog-server，默认 3001）
# 前端请求 /api-blog/posts 等到上游 /api/posts
location ^~ /api-blog/ {
    proxy_pass http://127.0.0.1:3001/api/;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
}

# 聊天室 HTTP（chat-room-server，默认 3002）
location ^~ /api-chat/ {
    proxy_pass http://127.0.0.1:3002/api/;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
}

# 聊天室 WebSocket（Socket.io，须与 chat-room-server 同端口）
location ^~ /api/chat-socket/ {
    proxy_pass http://127.0.0.1:3002;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_read_timeout 86400s;
    proxy_send_timeout 86400s;
}
